name: Deploy to Deno Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: test-static-site
          entrypoint: server.ts
          token: ${{ secrets.DENO_DEPLOY_TOKEN }}

name: Deploy to Oracle Cloud Object Storage

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          pip install oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          echo "${{ secrets.OCI_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config

      - name: Deploy to Object Storage
        run: |
          for file in $(find . -type f ! -path './.git/*' ! -path './.github/*'); do
            name="${file#./}"
            case "$file" in
              *.html) ct="text/html" ;;
              *.css)  ct="text/css" ;;
              *.js)   ct="application/javascript" ;;
              *.json) ct="application/json" ;;
              *.png)  ct="image/png" ;;
              *.jpg|*.jpeg) ct="image/jpeg" ;;
              *.svg)  ct="image/svg+xml" ;;
              *.ico)  ct="image/x-icon" ;;
              *)      ct="application/octet-stream" ;;
            esac
            oci os object put \
              --bucket-name test-static-site \
              --file "$file" \
              --name "$name" \
              --content-type "$ct" \
              --force
          done
